<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Para o Amor da Minha Vida ❤️</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle, #ff758c, #ff7eb3);
      overflow: hidden;
      font-family: 'Arial', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .card {
      width: 320px;
      height: 200px;
      background: white;
      color: #333;
      border-radius: 10px;
      position: relative;
      cursor: pointer;
      transform-style: preserve-3d;
      transition: transform 1s;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .card.open {
      transform: rotateY(180deg);
    }

    .front, .inside {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
    }

    .front {
      background: #ff4b5c;
      color: white;
      font-size: 1.5rem;
    }

    .inside {
      transform: rotateY(180deg);
      background: #fff;
      font-size: 1rem;
    }

    /* Corações */
    .heart {
      position: absolute;
      width: 15px;
      height: 15px;
      background: red;
      transform: rotate(45deg);
      animation: float 5s infinite;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 15px;
      height: 15px;
      background: red;
      border-radius: 50%;
    }

    .heart::before {
      top: -7px;
      left: 0;
    }

    .heart::after {
      left: -7px;
      top: 0;
    }

    @keyframes float {
      0% {
        transform: translateY(100vh) rotate(45deg);
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh) rotate(45deg);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

<audio autoplay loop>
  <source src="COLE_AQUI_LINK_DA_MUSICA.mp3" type="audio/mpeg">
</audio>

<div class="card" onclick="abrirCarta()">
  <div class="front">
    💌 Clique para abrir
  </div>

  <div class="inside">
    <div>
      <h2>Para você, NOME_DELA ❤️</h2>
      <p>
        Desde que você entrou na minha vida, tudo ficou mais bonito.  
        Seu sorriso ilumina meus dias, e seu carinho aquece meu coração.  
        Você é meu porto seguro, minha felicidade e meu maior amor.  
        <br><br>
        Eu te amo hoje, amanhã e para sempre 💖
      </p>
    </div>
  </div>
</div>

<script>
  function abrirCarta() {
    document.querySelector('.card').classList.toggle('open');
  }

  function criarCoracao() {
    const heart = document.createElement('div');
    heart.classList.add('heart');
    heart.style.left = Math.random() * window.innerWidth + 'px';
    heart.style.animationDuration = (3 + Math.random() * 2) + 's';
    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 5000);
  }

  setInterval(criarCoracao, 300);
</script>

</body>
</html>
