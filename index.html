<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Teca Tintas — Tintas, Elétrico & Construção | Manaus</title>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600;700&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --orange: #F5A623;
      --dark: #2C2C2C;
      --light: #FFF8F0;
      --white: #fff;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--light);
      color: var(--dark);
    }

    nav {
      position: fixed;
      width: 100%;
      height: 70px;
      background: #fff;
      display:flex;
      justify-content: space-between;
      align-items:center;
      padding:0 40px;
      border-bottom:2px solid var(--orange);
      z-index:100;
    }

    .nav-logo {
      font-family:'Bebas Neue';
      font-size:2rem;
    }

    .hero {
      display:grid;
      grid-template-columns:1fr 1fr;
      min-height:100vh;
      padding-top:70px;
      background: linear-gradient(135deg,#fff8f0,#ffe4b5);
    }

    .hero-left {
      padding:80px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .hero-title {
      font-family:'Bebas Neue';
      font-size:5rem;
      line-height:0.9;
    }

    .hero-title em {
      color:var(--orange);
      font-style:normal;
    }

    .hero-sub {
      margin-top:20px;
      max-width:400px;
    }

    .btn-primary {
      background:var(--orange);
      color:#fff;
      padding:14px 28px;
      margin-top:30px;
      text-decoration:none;
      display:inline-block;
      border-radius:6px;
      font-weight:bold;
    }

    .hero-right {
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
    }

    .hero-avatar-wrap {
      position:relative;
    }

    .hero-avatar-img {
      width:380px;
      height:480px;
      object-fit:cover;
      border-radius:20px;
      filter: drop-shadow(0 30px 80px rgba(245,166,35,0.4));
    }

    .hero-avatar-badge {
      position:absolute;
      background:#fff;
      border:2px solid var(--orange);
      border-radius:20px;
      padding:6px 12px;
      font-size:0.8rem;
      font-weight:700;
    }

    .badge-1 { top:40px; left:-20px; }
    .badge-2 { top:200px; right:-20px; }
    .badge-3 { bottom:40px; left:-20px; }

    @media(max-width:900px){
      .hero { grid-template-columns:1fr; }
      .hero-right { display:none; }
    }

  </style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">TECA <span style="color:#F5A623;">TINTAS</span></div>
</nav>

<!-- HERO -->
<section class="hero">

  <div class="hero-left">
    <h1 class="hero-title">
      TUDO EM<br><em>TINTAS</em><br>CONSTRUÇÃO
    </h1>

    <p class="hero-sub">
      Tintas, materiais elétricos e construção com entrega rápida em Manaus.
    </p>

    <a href="https://wa.me/5592993204869" class="btn-primary">
      Pedir pelo WhatsApp
    </a>
  </div>

  <!-- AVATAR -->
  <div class="hero-right">
    <div class="hero-avatar-wrap">

      <a href="https://wa.me/5592993204869" target="_blank">
        <img src="IMG_1576.jpeg" class="hero-avatar-img" alt="Atendente Teca Tintas"/>
      </a>

      <div class="hero-avatar-badge badge-1">🎨 Especialista</div>
      <div class="hero-avatar-badge badge-2">⚡ Rápido</div>
      <div class="hero-avatar-badge badge-3">🚚 Entrega</div>

    </div>
  </div>

</section>

</body>
</html>
